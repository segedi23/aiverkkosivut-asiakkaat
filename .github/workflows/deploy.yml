name: Build and deploy changed sites

on:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - 'customers.json'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Site slug to rebuild (empty = all changed)'
        required: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.detect.outputs.slugs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "slugs=[\"${{ github.event.inputs.slug }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          changed=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff --name-only HEAD HEAD)
          slugs=$(echo "$changed" | awk -F/ '/^sites\// {print $2}' | sort -u | jq -R -s -c 'split("\n")|map(select(length>0))')
          if [ -z "$slugs" ] || [ "$slugs" = "[]" ]; then slugs='[]'; fi
          echo "slugs=$slugs" >> $GITHUB_OUTPUT
          echo "Detected slugs: $slugs"

  build-deploy:
    needs: detect
    if: needs.detect.outputs.slugs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.detect.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Netlify site ID from customers.json
        id: site
        shell: bash
        run: |
          id=$(jq -r --arg slug "${{ matrix.slug }}" '.[] | select(.slug==$slug) | .netlifySiteId // empty' customers.json)
          if [ -z "$id" ]; then
            echo "::error::No netlifySiteId for slug ${{ matrix.slug }} in customers.json"
            exit 1
          fi
          echo "id=$id" >> $GITHUB_OUTPUT
          echo "Resolved ${{ matrix.slug }} → $id"

      - name: Install dependencies
        working-directory: sites/${{ matrix.slug }}
        run: npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund

      - name: Build
        working-directory: sites/${{ matrix.slug }}
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: sites/${{ matrix.slug }}/dist
          production-deploy: true
          deploy-message: "commit ${{ github.sha }}: ${{ github.event.head_commit.message }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-commit-status: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ steps.site.outputs.id }}
